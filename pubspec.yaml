name: flex_flow
description: A behavior-driven fitness consistency platform.
version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.5
  
  # Firebase
  firebase_core: ^2.15.0
  cloud_firestore: ^4.8.3
  firebase_auth: ^4.7.2
  
  # UI & UX
  google_fonts: ^5.1.0
  animations: ^2.0.8
  font_awesome_flutter: ^10.4.0
  glass_kit: ^2.1.0
  flutter_staggered_animations: ^1.0.0
  
  # Charts
  fl_chart: ^0.63.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
